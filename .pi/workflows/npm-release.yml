name: npm-release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      
      - name: Enable bypass-2fa
        run: |
          npm profile set --bypass-2fa ${{ secrets.NPM_TOKEN_BYPASS_2FA }} 2>&1 || echo "Already enabled"
          echo "bypass-2fa configured"
        env:
          NPM_TOKEN_BYPASS_2FA: ${{ secrets.NPM_TOKEN_BYPASS_2FA }}
      
      - name: Wait
        run: sleep 30
      
      - name: Publish
        run: npm publish --access public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_BYPASS_2FA }}
      
      - name: Verify
        run: curl -s https://registry.npmjs.org/@agpenton/chain-as-agent
